name: 🚀 Deploy to Xperience Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Contabo VPS
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: 🚀 Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@158.220.111.34 << 'ENDSSH'
            set -e
            echo "📁 Xperience papkasiga o'tish..."
            cd ~/ILS-startup/Xperience

            echo "📥 Yangi kodlarni olish..."
            git fetch origin
            git reset --hard origin/main

            echo "🔨 Frontend qayta build qilish..."
            docker-compose -f docker-compose.demo.yml build frontend_demo --no-cache

            echo "🔄 Konteynerlarni yangilash..."
            docker-compose -f docker-compose.demo.yml up -d

            echo "⏳ Backend tayyor bo'lishini kutish (20s)..."
            sleep 20

            echo "✅ Deploy muvaffaqiyatli yakunlandi!"
          ENDSSH
